<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Circle (Dark Navy/Indigo) -->
  <circle cx="256" cy="256" r="240" fill="#0c0b16" stroke="#1f1e38" stroke-width="8" />

  <!-- Radar Crosshair Markings -->
  <!-- Outer Target Ring -->
  <circle cx="256" cy="256" r="215" fill="none" stroke="#FBBF24" stroke-width="20" />
  
  <!-- Middle Target Ring -->
  <circle cx="256" cy="256" r="123" fill="none" stroke="#FBBF24" stroke-width="20" />
  
  <!-- Center Bullseye Dot -->
  <circle cx="256" cy="256" r="41" fill="#FBBF24" />

  <!-- Axes Lines -->
  <!-- Vertical Crosshair Line -->
  <line x1="256" y1="10" x2="256" y2="502" stroke="#FBBF24" stroke-width="20" />
  
  <!-- Horizontal Crosshair Line -->
  <line x1="10" y1="256" x2="502" y2="256" stroke="#FBBF24" stroke-width="20" />

  <!-- Diagonal Sub-Axes -->
  <line x1="82" y1="82" x2="430" y2="430" stroke="#FBBF24" stroke-width="20" />
  <line x1="82" y1="430" x2="430" y2="82" stroke="#FBBF24" stroke-width="20" />
</svg>